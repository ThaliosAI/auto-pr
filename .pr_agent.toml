# PR-Agent shared defaults.
# Copy this file to the root of any repo using auto-pr to customise behaviour.
# Full option reference: https://github.com/Codium-ai/pr-agent/blob/main/pr_agent/settings/configuration.toml

[config]
model = "ollama/qwen2.5-coder:32b-instruct-q8_0"
fallback_models = ["ollama/qwen2.5-coder:32b"]
custom_model_max_tokens = 64000
temperature = 0
ai_timeout = 3600
enable_auto_describe = false
publish_output_progress = false
include_generated_by_header = true

[pr_description]
publish_labels = false

[pr_reviewer]
require_focused_review = true
require_estimate_effort_to_review = true
require_security_review = true
num_code_suggestions = 0             # suggestions come from the separate `improve` step
extra_instructions = "Be specific. For each changed file, identify concrete concerns: unclear naming, missing error handling, potential edge cases, or design decisions worth discussing. Reference actual code from the diff. Do not default to 'no issues' without examining the code carefully."

[pr_code_suggestions]
num_code_suggestions = 4
summarize = true
max_number_of_calls = 1
extra_instructions = "Provide specific, targeted suggestions. Focus on correctness issues, missing guards, unclear logic, and code that could silently fail. Each suggestion must reference a concrete line or pattern from the diff."
