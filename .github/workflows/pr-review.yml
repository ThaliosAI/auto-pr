# Reusable PR review pipeline.
#
# Call from any repo with:
#
#   jobs:
#     review:
#       uses: YOUR_ORG/auto-pr/.github/workflows/pr-review.yml@master
#       secrets: inherit
#
# The LLM job runs on a self-hosted runner tagged [self-hosted, llm].
# Register your RTX 5090 machine as a runner:
#   Settings → Actions → Runners → New self-hosted runner
#   Then add the label "llm" to the runner after registration.

name: PR Review Pipeline

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      coverage-threshold:
        description: "Minimum test coverage %"
        type: number
        default: 80
      install-cmd:
        description: "Shell command to install project dependencies before tests"
        type: string
        default: >-
          pip install -e ".[dev]" 2>/dev/null ||
          pip install -r requirements-dev.txt 2>/dev/null ||
          pip install pytest pytest-cov
      test-cmd:
        description: "Pytest invocation (coverage flag is appended automatically)"
        type: string
        default: "pytest -q"
      ollama-model:
        description: "Ollama model name for PR-Agent review"
        type: string
        default: "qwen3-30b-pr:latest"
      ollama-host:
        description: "Ollama API base URL (on the self-hosted runner)"
        type: string
        default: "http://localhost:11435"
      ollama-num-ctx:
        description: "Ollama context window size (tokens) — must match num_ctx in the model's Modelfile"
        type: number
        default: 49152
      test-runner:
        description: "Runner for the test job — use 'ubuntu-latest' for lightweight repos"
        type: string
        default: "self-hosted"

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Ruff — style & syntax
  # ─────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Check style
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  # ─────────────────────────────────────────────
  # Stage 2: Pytest + coverage gate
  # ─────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ${{ inputs.test-runner }}
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: ${{ inputs.install-cmd }}

      - name: Install pytest-cov
        run: pip install pytest-cov

      - name: Run tests
        run: >-
          ${{ inputs.test-cmd }}
          --cov=.
          --cov-report=xml
          --cov-fail-under=${{ inputs.coverage-threshold }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 3: PR-Agent review via local Ollama
  # ─────────────────────────────────────────────
  llm-review:
    name: PR-Agent Review
    runs-on: [self-hosted, llm]
    needs: test
    if: github.event_name == 'pull_request'
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Install pr-agent
        run: |
          python3 -m venv "$HOME/.pr-agent-venv" --system-site-packages
          $HOME/.pr-agent-venv/bin/pip install pr-agent --upgrade --quiet

      - name: Describe PR
        continue-on-error: true
        env:
          CONFIG__MODEL: "ollama_chat/${{ inputs.ollama-model }}"
          CONFIG__AI_TIMEOUT: "3600"
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "32768"
          CONFIG__FALLBACK_MODELS: "[]"
          CONFIG__PUBLISH_OUTPUT_PROGRESS: "false"
          CONFIG__TEMPERATURE: "0"
          OLLAMA__API_BASE: "${{ inputs.ollama-host }}"
          OLLAMA__OLLAMA_NUM_CTX: "${{ inputs.ollama-num-ctx }}"
          PR_DESCRIPTION__PUBLISH_LABELS: "false"
          GITHUB__USER_TOKEN: "${{ github.token }}"
        run: $HOME/.pr-agent-venv/bin/python -m pr_agent.cli --pr_url="${{ github.event.pull_request.html_url }}" describe

      - name: Review PR
        continue-on-error: true
        env:
          CONFIG__MODEL: "ollama_chat/${{ inputs.ollama-model }}"
          CONFIG__AI_TIMEOUT: "3600"
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "32768"
          CONFIG__FALLBACK_MODELS: "[]"
          CONFIG__PUBLISH_OUTPUT_PROGRESS: "false"
          CONFIG__INCLUDE_GENERATED_BY_HEADER: "true"
          CONFIG__TEMPERATURE: "0"
          OLLAMA__API_BASE: "${{ inputs.ollama-host }}"
          OLLAMA__OLLAMA_NUM_CTX: "${{ inputs.ollama-num-ctx }}"
          PR_REVIEWER__NUM_CODE_SUGGESTIONS: "0"
          PR_REVIEWER__EXTRA_INSTRUCTIONS: "Be specific. For each changed file, identify concrete concerns: unclear naming, missing error handling, potential edge cases, or design decisions worth discussing. Reference actual code from the diff. Do not default to 'no issues' without examining the code carefully."
          GITHUB__USER_TOKEN: "${{ github.token }}"
        run: $HOME/.pr-agent-venv/bin/python -m pr_agent.cli --pr_url="${{ github.event.pull_request.html_url }}" review

      - name: Suggest improvements
        continue-on-error: true
        env:
          CONFIG__MODEL: "ollama_chat/${{ inputs.ollama-model }}"
          CONFIG__AI_TIMEOUT: "3600"
          CONFIG__CUSTOM_MODEL_MAX_TOKENS: "32768"
          CONFIG__FALLBACK_MODELS: "[]"
          CONFIG__PUBLISH_OUTPUT_PROGRESS: "false"
          CONFIG__TEMPERATURE: "0"
          OLLAMA__API_BASE: "${{ inputs.ollama-host }}"
          OLLAMA__OLLAMA_NUM_CTX: "${{ inputs.ollama-num-ctx }}"
          PR_CODE_SUGGESTIONS__MAX_NUMBER_OF_CALLS: "1"
          PR_CODE_SUGGESTIONS__EXTRA_INSTRUCTIONS: "Provide specific, targeted suggestions. Focus on correctness issues, missing guards, unclear logic, and code that could silently fail. Each suggestion must reference a concrete line or pattern from the diff."
          GITHUB__USER_TOKEN: "${{ github.token }}"
        run: $HOME/.pr-agent-venv/bin/python -m pr_agent.cli --pr_url="${{ github.event.pull_request.html_url }}" improve
