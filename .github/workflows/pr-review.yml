# Reusable PR review pipeline.
#
# Call from any repo with:
#
#   jobs:
#     review:
#       uses: YOUR_ORG/auto-pr/.github/workflows/pr-review.yml@master
#       secrets: inherit
#
# The LLM job runs on a self-hosted runner tagged [self-hosted, llm].
# Register your RTX 5090 machine as a runner:
#   Settings → Actions → Runners → New self-hosted runner
#   Then add the label "llm" to the runner after registration.
#
# Behaviour is configured via .pr_agent.toml in the calling repo.
# Copy auto-pr/.pr_agent.toml to your repo root as a starting point.

name: PR Review Pipeline

on:
  workflow_call:
    inputs:
      python-version:
        description: "Python version"
        type: string
        default: "3.11"
      coverage-threshold:
        description: "Minimum test coverage %"
        type: number
        default: 80
      install-cmd:
        description: "Shell command to install project dependencies before tests"
        type: string
        default: >-
          pip install -e ".[dev]" 2>/dev/null ||
          pip install -r requirements-dev.txt 2>/dev/null ||
          pip install pytest pytest-cov
      test-cmd:
        description: "Pytest invocation (coverage flag is appended automatically)"
        type: string
        default: "pytest -q"
      ollama-model:
        description: "Ollama model name for PR-Agent review"
        type: string
        default: "qwen2.5-coder:32b-instruct-q8_0"
      ollama-host:
        description: "Ollama API base URL (on the self-hosted runner)"
        type: string
        default: "http://localhost:11435"
      ollama-num-ctx:
        description: "Ollama context window size (tokens) — must match num_ctx in the model's Modelfile"
        type: number
        default: 98304
      test-runner:
        description: "Runner for the test job — use 'ubuntu-latest' for lightweight repos"
        type: string
        default: "self-hosted"

jobs:
  # ─────────────────────────────────────────────
  # Stage 1: Ruff — style & syntax
  # ─────────────────────────────────────────────
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: pip

      - name: Install Ruff
        run: pip install ruff

      - name: Check style
        run: ruff check .

      - name: Check formatting
        run: ruff format --check .

  # ─────────────────────────────────────────────
  # Stage 2: Pytest + coverage gate
  # ─────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ${{ inputs.test-runner }}
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: ${{ inputs.install-cmd }}

      - name: Install pytest-cov
        run: pip install pytest-cov

      - name: Run tests
        run: >-
          ${{ inputs.test-cmd }}
          --cov=.
          --cov-report=xml
          --cov-fail-under=${{ inputs.coverage-threshold }}

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  # ─────────────────────────────────────────────
  # Stage 3: PR-Agent review via local Ollama
  # Disabled for now — set if: true to re-enable
  # ─────────────────────────────────────────────
  llm-review:
    name: PR-Agent Review
    runs-on: [self-hosted, llm]
    needs: test
    if: false
    permissions:
      pull-requests: write
      contents: read
    steps:
      - name: Install pr-agent
        run: |
          python3 -m venv "$HOME/.pr-agent-venv" --system-site-packages
          $HOME/.pr-agent-venv/bin/pip install pr-agent --upgrade --quiet

      - name: Describe PR
        continue-on-error: true
        env:
          OLLAMA__API_BASE: "${{ inputs.ollama-host }}"
          OLLAMA__OLLAMA_NUM_CTX: "${{ inputs.ollama-num-ctx }}"
          GITHUB__USER_TOKEN: "${{ github.token }}"
        run: $HOME/.pr-agent-venv/bin/python -m pr_agent.cli --pr_url="${{ github.event.pull_request.html_url }}" describe

      - name: Review PR
        continue-on-error: true
        env:
          OLLAMA__API_BASE: "${{ inputs.ollama-host }}"
          OLLAMA__OLLAMA_NUM_CTX: "${{ inputs.ollama-num-ctx }}"
          GITHUB__USER_TOKEN: "${{ github.token }}"
        run: $HOME/.pr-agent-venv/bin/python -m pr_agent.cli --pr_url="${{ github.event.pull_request.html_url }}" review

      - name: Suggest improvements
        continue-on-error: true
        env:
          OLLAMA__API_BASE: "${{ inputs.ollama-host }}"
          OLLAMA__OLLAMA_NUM_CTX: "${{ inputs.ollama-num-ctx }}"
          GITHUB__USER_TOKEN: "${{ github.token }}"
        run: $HOME/.pr-agent-venv/bin/python -m pr_agent.cli --pr_url="${{ github.event.pull_request.html_url }}" improve
